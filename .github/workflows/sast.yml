name: SAST — Bandit Security Scan

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  schedule:
    - cron: '0 3 * * 1'   # щопонеділка о 03:00

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit — JSON
        run: bandit -r backend/ -f json -o security/reports/bandit-report.json -c backend/.bandit || true

      - name: Run Bandit — HTML
        run: bandit -r backend/ -f html -o security/reports/bandit-report.html -c backend/.bandit || true

      - name: Run Bandit — fail on MEDIUM severity
        run: bandit -r backend/ -ll -ii -c backend/.bandit
        # -ll  → мінімальний severity рівень: MEDIUM
        # -ii  → мінімальний confidence: MEDIUM
        # -c backend/.bandit → exclude_dirs = tests

      - name: Upload SAST Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-reports
          path: security/reports/
