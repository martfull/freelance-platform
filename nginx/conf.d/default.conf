server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    # FastAPI — всі запити на бекенд
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location /api/accounts/login {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://api:8000/accounts/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/accounts/register {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://api:8000/accounts/register;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Next.js frontend
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # health check — залишається на nginx рівні
    location = /health {
        proxy_pass http://api:8000/health;
    }
}
